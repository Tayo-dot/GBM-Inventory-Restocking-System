<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Inventory Restocking System{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
</head>
<body class="dashboard-body">

    <div class="d-flex min-vh-100">
        <aside class="sidebar p-4">
            <h3 class="sidebar-brand mb-4">Inventory System</h3>

            <div class="user-box mb-4">
                <div class="user-icon">
                    <i class="fa-solid fa-user-circle"></i>
                </div>

                <div class="fw-bold">{{ username | title }}</div>
                <small class="text-muted">{{ role }}</small>
            </div>

            <nav class="nav flex-column gap-2">
                <a class="nav-link sidebar-link active" href="{{ url_for('dashboard_page') }}">Dashboard</a>

                {% if role == "Administrator" %}
                    <a class="nav-link sidebar-link" href="{{ url_for('create_user_page') }}">Create User</a>
                    <a class="nav-link sidebar-link" href="{{ url_for('import_page') }}">Import Data</a>
                {% endif %}

                <a class="nav-link sidebar-link" href="{{ url_for('products_page') }}">Products</a>
                <a class="nav-link sidebar-link" href="{{ url_for('inventory_page') }}">Inventory</a>
                <a class="nav-link sidebar-link" href="{{ url_for('forecast_page') }}">Forecast Demand</a>
                <a class="nav-link sidebar-link" href="{{ url_for('restock_page') }}">Restocking</a>
                <a class="nav-link sidebar-link" href="{{ url_for('batch_page') }}">Batch Prediction</a>
            </nav>

            <div class="mt-auto pt-4">
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger w-100">Logout</a>
            </div>
        </aside>

        <main class="flex-grow-1 main-content p-4 p-lg-5">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block extra_js %}{% endblock %}

</body>
</html>
